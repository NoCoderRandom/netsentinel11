name: Windows build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        shell: pwsh
        run: >
          cmake -S . -B build
          -G "Visual Studio 17 2022"
          -A x64
          -DBUILD_TESTING=OFF
          -DNETSENTINEL_BUILD_TESTS=OFF

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release --target netsentinel11

      - name: Smoke
        shell: pwsh
        run: .\build\bin\Release\netsentinel11.exe --smoke
